{% extends "base_auth.html" %}
{% block title %}Kirish — SavdoTizim{% endblock %}
{% block content %}
<div class="login-card">
  <div style="text-align:center; margin-bottom:24px;">
    <div style="font-size:18px; font-weight:600;"><span style="color:#534AB7;">●</span> SavdoTizim</div>
    <div style="font-size:13px; color:#888; margin-top:4px;">Hisobingizga kiring</div>
  </div>

  {% if form.errors %}
  <div class="alert alert-error">
    <i class="ti ti-circle-x" style="font-size:16px;flex-shrink:0;margin-top:1px;"></i>
    <span>Login yoki parol noto'g'ri. Qaytadan urinib ko'ring.</span>
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Foydalanuvchi nomi</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label">Parol</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
      <i class="ti ti-login"></i> Kirish
    </button>
  </form>
</div>
{% endblock %}
