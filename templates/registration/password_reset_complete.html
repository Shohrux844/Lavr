{% extends "base_auth.html" %}
{% block title %}Muvaffaqiyatli — SavdoTizim{% endblock %}
{% block content %}
    <div class="login-card" style="text-align:center;">
        <div style="width:56px;height:56px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i class="ti ti-circle-check" style="font-size:24px;color:#3B6D11;"></i>
        </div>
        <h2 style="font-size:16px; font-weight:600; margin-bottom:8px;">Parol o'zgartirildi</h2>
        <p style="font-size:13px; color:#888; margin-bottom:20px;">
            Endi yangi parolingiz bilan tizimga kirishingiz mumkin.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary" style="width:100%; justify-content:center;">
            <i class="ti ti-login"></i> Kirish
        </a>
    </div>
{% endblock %}
