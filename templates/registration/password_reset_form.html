{% extends "base_auth.html" %}
{% block title %}Parolni tiklash — SavdoTizim{% endblock %}
{% block content %}
    <div class="login-card">
        <div style="text-align:center; margin-bottom:24px;">
            <div style="font-size:18px; font-weight:600;"><span style="color:#534AB7;">●</span> SavdoTizim</div>
            <div style="font-size:13px; color:#888; margin-top:4px;">Parolni tiklash</div>
        </div>

        <p style="font-size:12.5px; color:#666; margin-bottom:16px;">
            Hisobingizga bog'langan email manzilini kiriting — sizga parolni
            tiklash havolasi yuboriladi.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                <i class="ti ti-send"></i> Havola yuborish
            </button>
        </form>

        <div style="text-align:center; margin-top:16px;">
            <a href="{% url 'login' %}" style="font-size:12.5px; color:#534AB7; text-decoration:none;">
                <i class="ti ti-arrow-left"></i> Kirish sahifasiga qaytish
            </a>
        </div>
    </div>
{% endblock %}
