{% comment %}
Usage: {% include "partials/search_bar.html" with placeholder="Nakladnoy qidirish..." %}
{% endcomment %}

<form method="get" class="flex items-center gap-2 mb-5">
  <div class="relative flex-1 max-w-xs">
    <i class="ti ti-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
    <input type="text" name="q" value="{{ q }}"
           placeholder="{{ placeholder|default:'Qidirish...' }}"
           class="w-full pl-8 pr-3 py-2 text-sm bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
  </div>
  {% block extra_filters %}{% endblock %}
  <button type="submit"
          class="px-3 py-2 text-xs bg-white border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600 transition-colors">
    Qidirish
  </button>
  {% if q or status_filter or method_filter %}
    <a href="{{ request.path }}" class="text-xs text-slate-400 hover:text-slate-600">Tozalash</a>
  {% endif %}
</form>
