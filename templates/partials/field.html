{% comment %}
Usage: {% include "partials/field.html" with field=form.name label="Ism" %}
{% endcomment %}
<div>
  <label for="{{ field.id_for_label }}"
         class="block text-xs text-slate-500 mb-1 font-medium">
    {{ label }}
    {% if field.field.required %}<span class="text-red-400">*</span>{% endif %}
  </label>

  <div class="[&_input]:w-full [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm
              [&_input]:bg-white [&_input]:border [&_input]:border-slate-200
              [&_input]:rounded-lg [&_input]:focus:outline-none
              [&_input]:focus:ring-2 [&_input]:focus:ring-indigo-300
              [&_input]:text-slate-700
              [&_select]:w-full [&_select]:px-3 [&_select]:py-2 [&_select]:text-sm
              [&_select]:bg-white [&_select]:border [&_select]:border-slate-200
              [&_select]:rounded-lg [&_select]:focus:outline-none
              [&_select]:focus:ring-2 [&_select]:focus:ring-indigo-300
              [&_select]:text-slate-700
              [&_textarea]:w-full [&_textarea]:px-3 [&_textarea]:py-2
              [&_textarea]:text-sm [&_textarea]:bg-white
              [&_textarea]:border [&_textarea]:border-slate-200
              [&_textarea]:rounded-lg [&_textarea]:focus:outline-none
              [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-indigo-300
              [&_textarea]:text-slate-700 [&_textarea]:resize-none">
    {{ field }}
  </div>

  {% if field.errors %}
    {% for error in field.errors %}
      <p class="text-xs text-red-500 mt-1">{{ error }}</p>
    {% endfor %}
  {% endif %}
</div>
