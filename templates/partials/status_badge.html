{% comment %}
Usage: {% include "partials/status_badge.html" with status=order.status %}
{% endcomment %}

{% if status == 'paid' %}
  <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium badge-green">
    <i class="ti ti-check text-[10px]"></i> To'langan
  </span>
{% elif status == 'pending' %}
  <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium badge-amber">
    <i class="ti ti-clock text-[10px]"></i> Kutilmoqda
  </span>
{% elif status == 'debt' %}
  <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium badge-red">
    <i class="ti ti-alert-circle text-[10px]"></i> Qarz
  </span>
{% elif status == 'cancelled' %}
  <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium badge-gray">
    <i class="ti ti-x text-[10px]"></i> Bekor
  </span>
{% endif %}
