<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}SavdoTizim{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F5F5F7;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            width: 360px;
            background: #fff;
            border: 1px solid #EBEBEB;
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .form-control {
            width: 100%;
            padding: 9px 12px;
            font-size: 13.5px;
            border: 1px solid #DDDDE3;
            border-radius: 8px;
            background: #fff;
            color: #1a1a1a;
            outline: none;
            transition: border .12s;
        }

        .form-control:focus {
            border-color: #534AB7;
            box-shadow: 0 0 0 3px #EEEDFE;
        }

        .form-label {
            font-size: 12.5px;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 14px;
            font-size: 13.5px;
            border-radius: 8px;
            border: 1px solid #DDDDE3;
            background: #fff;
            cursor: pointer;
            color: #333;
            text-decoration: none;
        }

        .btn-primary {
            background: #534AB7;
            color: #fff;
            border-color: #534AB7;
        }

        .btn-primary:hover {
            background: #3C3489;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12.5px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 14px;
        }

        .alert-error {
            background: #FCEBEB;
            color: #A32D2D;
            border: 1px solid #F7C1C1;
        }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
